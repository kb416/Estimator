<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Estimator | Riverdale Construction Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Variables ────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:      #4e463b;
      --primary-dark: #2c2825;
      --secondary:    #5b656c;
      --accent:       #c8a96e;
      --accent-light: #f0e6d3;
      --bg:           #f5f3f0;
      --card:         #ffffff;
      --border:       #d6d2cc;
      --border-light: #ebe8e4;
      --text:         #2a2520;
      --text-muted:   #6b6358;
      --success:      #3d7a52;
      --shadow-sm:    0 1px 3px rgba(0,0,0,.07);
      --shadow-md:    0 4px 14px rgba(0,0,0,.09);
      --r-sm: 6px; --r-md: 10px; --r-lg: 16px;
    }
    body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; -webkit-font-smoothing:antialiased; }
    input,select,textarea,button { font-family:inherit; font-size:1rem; }
    h1,h2,h3,h4 { line-height:1.3; font-weight:600; color:var(--primary-dark); }

    /* ── App Shell ──────────────────────────────────────────── */
    .app { min-height:100vh; display:flex; flex-direction:column; }
    .main-content { flex:1; max-width:1100px; margin:0 auto; width:100%; padding:2rem 1.5rem 3rem; }

    /* ── Header ─────────────────────────────────────────────── */
    .site-header { background:var(--primary-dark); color:#fff; padding:0 1.5rem; }
    .header-inner { max-width:1100px; margin:0 auto; display:flex; align-items:center; gap:2.5rem; padding:1.25rem 0; }
    .logo { display:flex; align-items:center; border-right:1px solid rgba(255,255,255,.2); padding-right:2.5rem; flex-shrink:0; }
    .logo a { display:flex; align-items:center; text-decoration:none; }
    .logo-img { height:80px; width:auto; background:#fff; border-radius:8px; padding:6px 10px; display:block; }
    .header-title h1 { font-size:1.15rem; font-weight:600; color:#fff; margin-bottom:2px; }
    .header-title p  { font-size:.8rem; color:rgba(255,255,255,.5); font-weight:400; }

    /* ── Progress Bar ───────────────────────────────────────── */
    .progress-bar { display:flex; align-items:center; margin-bottom:2.5rem; }
    .progress-step { display:flex; align-items:center; flex:1; }
    .progress-circle { width:32px; height:32px; border-radius:50%; border:2px solid var(--border); background:var(--card); color:var(--text-muted); font-size:.8rem; font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .2s; }
    .progress-step.done   .progress-circle { background:var(--success); border-color:var(--success); color:#fff; }
    .progress-step.active .progress-circle { background:var(--primary); border-color:var(--primary); color:#fff; }
    .progress-label { font-size:.72rem; font-weight:500; color:var(--text-muted); margin-left:8px; white-space:nowrap; }
    .progress-step.active .progress-label { color:var(--primary); font-weight:600; }
    .progress-step.done   .progress-label { color:var(--success); }
    .progress-connector { flex:1; height:2px; background:var(--border); margin:0 8px; }
    .progress-step.done .progress-connector { background:var(--success); }

    /* ── Wizard Layout ──────────────────────────────────────── */
    .wizard-layout { display:grid; grid-template-columns:1fr; gap:2rem; }
    .wizard-layout.with-panel { grid-template-columns:1fr 320px; align-items:start; }
    .wizard-form { background:var(--card); border:1px solid var(--border); border-radius:var(--r-lg); padding:2.25rem 2.5rem; box-shadow:var(--shadow-sm); }
    #wizard-panel { position:sticky; top:1.5rem; }

    /* ── Step common ────────────────────────────────────────── */
    .step-header { margin-bottom:2rem; padding-bottom:1.25rem; border-bottom:1px solid var(--border-light); }
    .step-header h2 { font-size:1.4rem; margin-bottom:.35rem; }
    .step-header p  { color:var(--text-muted); font-size:.9rem; }

    /* ── Project Type Grid ──────────────────────────────────── */
    .type-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; }
    .type-card { background:var(--card); border:2px solid var(--border); border-radius:var(--r-md); padding:1.5rem 1rem; text-align:center; cursor:pointer; transition:all .18s; display:flex; flex-direction:column; align-items:center; gap:.6rem; }
    .type-card:hover { border-color:var(--primary); box-shadow:var(--shadow-md); transform:translateY(-2px); }
    .type-card.selected { border-color:var(--primary); background:#faf8f5; box-shadow:var(--shadow-md); }
    .type-icon { width:44px; height:44px; color:var(--primary); }
    .type-icon svg { width:100%; height:100%; }
    .type-label { font-weight:600; font-size:.95rem; color:var(--primary-dark); }
    .type-desc  { font-size:.78rem; color:var(--text-muted); line-height:1.45; }

    /* ── Fields ─────────────────────────────────────────────── */
    .field-group { margin-bottom:1.5rem; }
    .field-group.inline { display:flex; align-items:center; gap:1rem; }
    .field-group.inline .field-label { min-width:fit-content; margin-bottom:0; }
    .field-label { display:block; font-size:.85rem; font-weight:600; color:var(--primary-dark); margin-bottom:.5rem; }
    .field-optional { font-weight:400; color:var(--text-muted); }
    .field-hint  { font-size:.78rem; color:var(--text-muted); margin-top:.4rem; }
    .field-error { font-size:.78rem; color:#c0392b; margin-top:.35rem; display:block; }
    .text-input { width:100%; padding:.6rem .85rem; border:1.5px solid var(--border); border-radius:var(--r-sm); font-size:.95rem; color:var(--text); background:#fff; transition:border-color .15s; outline:none; }
    .text-input:focus { border-color:var(--primary); }
    .text-input.error { border-color:#c0392b; }
    .text-input.sm  { width:80px; }
    .text-input.textarea { resize:vertical; min-height:80px; }

    /* ── Radio Cards ────────────────────────────────────────── */
    .radio-cards { display:flex; flex-direction:column; gap:.6rem; }
    .radio-card { display:flex; align-items:center; gap:.75rem; padding:.75rem 1rem; border:1.5px solid var(--border); border-radius:var(--r-sm); cursor:pointer; transition:all .15s; }
    .radio-card:hover { border-color:var(--primary); background:#faf8f5; }
    .radio-card.selected { border-color:var(--primary); background:#faf8f5; }
    .radio-card input[type="radio"] { accent-color:var(--primary); width:17px; height:17px; }
    .rc-label { font-size:.9rem; font-weight:500; }

    /* ── Scope Items ────────────────────────────────────────── */
    .scope-list { display:flex; flex-direction:column; gap:.6rem; }
    .scope-item { display:flex; align-items:flex-start; gap:.85rem; padding:.9rem 1rem; border:1.5px solid var(--border); border-radius:var(--r-sm); cursor:pointer; transition:all .15s; }
    .scope-item:hover { border-color:var(--primary); background:#faf8f5; }
    .scope-item.checked { border-color:var(--primary); background:#faf8f5; }
    .scope-item input[type="checkbox"] { accent-color:var(--primary); width:17px; height:17px; flex-shrink:0; margin-top:2px; cursor:pointer; }
    .scope-content { flex:1; }
    .scope-top { display:flex; justify-content:space-between; align-items:baseline; gap:1rem; margin-bottom:2px; }
    .scope-label { font-size:.9rem; font-weight:600; }
    .scope-cost  { font-size:.8rem; color:var(--accent); font-weight:600; white-space:nowrap; }
    .scope-desc  { font-size:.78rem; color:var(--text-muted); }

    /* ── Finish Cards ───────────────────────────────────────── */
    .finish-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:2rem; }
    .finish-card { border:2px solid var(--border); border-radius:var(--r-md); padding:1.5rem 1.25rem; text-align:left; cursor:pointer; background:var(--card); transition:all .18s; display:flex; flex-direction:column; gap:.4rem; }
    .finish-card:hover { border-color:var(--primary); box-shadow:var(--shadow-md); }
    .finish-card.selected { border-color:var(--primary); background:#faf8f5; box-shadow:var(--shadow-md); }
    .finish-dots { display:flex; gap:5px; margin-bottom:.5rem; }
    .finish-dot { width:10px; height:10px; border-radius:50%; background:var(--border); transition:background .15s; }
    .finish-dot.filled { background:var(--accent); }
    .finish-label   { font-size:1.05rem; font-weight:700; color:var(--primary-dark); }
    .finish-tagline { font-size:.78rem; color:var(--accent); font-weight:600; }
    .finish-desc    { font-size:.8rem; color:var(--text-muted); line-height:1.5; margin-top:.25rem; }

    /* ── Contact Form ───────────────────────────────────────── */
    .contact-estimate-banner { background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 100%); color:#fff; border-radius:var(--r-md); padding:1.25rem 1.5rem; margin-bottom:2rem; display:flex; align-items:center; justify-content:space-between; }
    .ceb-label { font-size:.8rem; text-transform:uppercase; letter-spacing:1px; opacity:.7; }
    .ceb-range { font-size:1.25rem; font-weight:700; color:var(--accent); }
    .form-row2 { display:flex; gap:1rem; }
    .form-row2 > * { flex:1; }

    /* ── Estimate Panel ─────────────────────────────────────── */
    .estimate-panel { background:var(--card); border:1px solid var(--border); border-radius:var(--r-lg); padding:1.5rem; box-shadow:var(--shadow-sm); }
    .ep-empty { text-align:center; padding:2rem; }
    .ep-empty h3 { margin-bottom:.75rem; font-size:1rem; }
    .ep-placeholder { font-size:.85rem; color:var(--text-muted); line-height:1.6; }
    .ep-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; padding-bottom:1rem; border-bottom:1px solid var(--border-light); }
    .ep-header h3 { font-size:.95rem; }
    .ep-badge { font-size:.72rem; font-weight:600; text-transform:uppercase; letter-spacing:.8px; color:var(--accent); background:var(--accent-light); padding:3px 8px; border-radius:20px; }
    .ep-total { background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 100%); color:#fff; border-radius:var(--r-md); padding:1.25rem; margin-bottom:1.25rem; text-align:center; }
    .ep-total-label    { font-size:.72rem; text-transform:uppercase; letter-spacing:1px; opacity:.65; }
    .ep-total-value    { font-size:1.35rem; font-weight:700; color:var(--accent); margin:4px 0 2px; }
    .ep-total-currency { font-size:.72rem; opacity:.6; letter-spacing:1px; }
    .ep-breakdown { display:flex; flex-direction:column; gap:.6rem; margin-bottom:1.25rem; }
    .ep-line { display:flex; justify-content:space-between; align-items:baseline; gap:.5rem; font-size:.8rem; }
    .ep-line.addon .ep-line-label { color:var(--text-muted); }
    .ep-line-label { flex:1; }
    .ep-line-value { font-weight:600; white-space:nowrap; font-size:.75rem; }
    .ep-disclaimer { font-size:.72rem; color:var(--text-muted); line-height:1.55; border-top:1px solid var(--border-light); padding-top:1rem; margin-bottom:.75rem; }
    .ep-cm-note    { font-size:.72rem; color:var(--text-muted); font-style:italic; }

    /* ── Buttons ────────────────────────────────────────────── */
    .nav-buttons { display:flex; justify-content:space-between; align-items:center; margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--border-light); }
    .btn { padding:.6rem 1.4rem; border-radius:var(--r-sm); font-size:.9rem; font-weight:600; border:none; transition:all .15s; cursor:pointer; }
    .btn.primary { background:var(--primary); color:#fff; }
    .btn.primary:hover:not(:disabled) { background:var(--primary-dark); box-shadow:var(--shadow-md); }
    .btn.primary:disabled { opacity:.55; cursor:not-allowed; }
    .btn.ghost  { background:transparent; color:var(--text-muted); border:1.5px solid var(--border); }
    .btn.ghost:hover { border-color:var(--primary); color:var(--primary); }
    .btn.lg { padding:.75rem 1.75rem; font-size:.95rem; }

    /* ── Confirmation ───────────────────────────────────────── */
    .confirmation { max-width:580px; margin:2rem auto; text-align:center; background:var(--card); border:1px solid var(--border); border-radius:var(--r-lg); padding:3rem 2.5rem; box-shadow:var(--shadow-md); }
    .confirm-icon { width:60px; height:60px; border-radius:50%; background:var(--success); color:#fff; font-size:1.5rem; display:flex; align-items:center; justify-content:center; margin:0 auto 1.25rem; }
    .confirmation h2 { font-size:1.5rem; margin-bottom:.75rem; }
    .confirm-lead { color:var(--text-muted); margin-bottom:1.5rem; }
    .confirm-summary { background:var(--bg); border:1px solid var(--border); border-radius:var(--r-md); padding:1.25rem; margin-bottom:1.75rem; }
    .confirm-summary h3 { font-size:1rem; margin-bottom:.5rem; }
    .confirm-range  { font-size:1.4rem; font-weight:700; color:var(--primary); }
    .confirm-finish { font-size:.82rem; color:var(--text-muted); margin-top:4px; }
    .confirm-next   { text-align:left; margin-bottom:1.5rem; }
    .confirm-next h4 { font-size:.9rem; margin-bottom:.75rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.8px; }
    .confirm-next ol { padding-left:1.25rem; color:var(--text-muted); font-size:.88rem; line-height:1.8; }
    .confirm-contact { font-size:.85rem; color:var(--text-muted); }
    .confirm-contact a { color:var(--primary); text-decoration:none; font-weight:600; }

    /* ── Footer ─────────────────────────────────────────────── */
    .site-footer { background:var(--primary-dark); color:rgba(255,255,255,.4); text-align:center; padding:1rem; font-size:.78rem; }

    /* ── Responsive ─────────────────────────────────────────── */
    @media(max-width:820px){
      .wizard-layout.with-panel { grid-template-columns:1fr; }
      #wizard-panel { position:static; order:-1; }
      .type-grid { grid-template-columns:repeat(2,1fr); }
      .finish-cards { grid-template-columns:1fr; }
      .form-row2 { flex-direction:column; }
      .wizard-form { padding:1.5rem; }
    }
    @media(max-width:480px){
      .type-grid { grid-template-columns:1fr; }
      .header-inner { gap:1.25rem; }
      .logo { padding-right:1.25rem; }
      .main-content { padding:1.25rem 1rem 2.5rem; }
    }
  </style>
</head>
<body>
<div class="app">
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <a href="https://www.riverdalecm.ca" target="_blank" rel="noreferrer">
          <img src="Logo%20long.jpg" alt="Riverdale Construction Management" class="logo-img">
        </a>
      </div>
      <div class="header-title">
        <h1>Project Estimator</h1>
        <p>Get a preliminary cost estimate for your renovation</p>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div id="progress-wrap"></div>
    <div id="wizard-layout" class="wizard-layout">
      <div id="wizard-form" class="wizard-form"></div>
      <div id="wizard-panel"></div>
    </div>
  </main>

  <footer class="site-footer">
    <p>© 2025 Riverdale Construction Management &middot; Toronto, ON</p>
  </footer>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────
// Sign up free at formspree.io, create a form, and paste your ID here.
// Leave as 'YOUR_FORMSPREE_ID' to use the mailto fallback instead.
const FORMSPREE_ID = 'xzdwjaqp'
const CONTACT_EMAIL = 'RiverdaleCM.ca@gmail.com'

// ── Cost Matrix (Toronto residential, CAD 2025) ───────────────────────────
const CM = {
  kitchen: {
    sizes: {
      small:  { label:'Small (under 100 sq ft)',  basic:[15000,28000],  standard:[28000,50000],  premium:[50000,100000]  },
      medium: { label:'Medium (100–200 sq ft)',   basic:[22000,40000],  standard:[40000,72000],  premium:[72000,145000]  },
      large:  { label:'Large (over 200 sq ft)',   basic:[32000,55000],  standard:[55000,100000], premium:[100000,215000] },
    },
    addOns: [
      { id:'appliances', label:'Appliance package',    desc:'Range, refrigerator, dishwasher, microwave',         costs:{ basic:[3000,7000],   standard:[7000,18000],  premium:[18000,55000]  } },
      { id:'plumbing',   label:'Plumbing relocation',  desc:'Move sink or add rough-in for new location',         costs:{ flat:[5000,12000] } },
      { id:'electrical', label:'Electrical upgrade',   desc:'Panel upgrade, new circuits, under-cabinet lighting',costs:{ flat:[3500,9000]  } },
      { id:'island',     label:'Kitchen island',       desc:'Custom or semi-custom island with cabinetry',        costs:{ basic:[3000,6000],   standard:[6000,14000],  premium:[14000,36000]  } },
    ],
  },
  bathroom: {
    types: {
      powder:  { label:'Powder room (2-piece)' },
      three:   { label:'3-piece bathroom'      },
      four:    { label:'4-piece bathroom'      },
      ensuite: { label:'En suite / master bath'},
    },
    sizes: {
      powder:  { basic:[6000,10000],   standard:[10000,18000],  premium:[18000,38000]   },
      three:   { basic:[11000,18000],  standard:[18000,35000],  premium:[35000,70000]   },
      four:    { basic:[15000,25000],  standard:[25000,48000],  premium:[48000,95000]   },
      ensuite: { basic:[22000,38000],  standard:[38000,70000],  premium:[70000,155000]  },
    },
    addOns: [
      { id:'heated_floor',  label:'Heated tile floor',       desc:'In-floor radiant heating system',           costs:{ flat:[2000,5500]  } },
      { id:'custom_tile',   label:'Custom tile work',        desc:'Feature wall, niches, decorative patterns', costs:{ basic:[1500,3500],   standard:[3500,8000],   premium:[8000,22000]  } },
      { id:'double_vanity', label:'Double vanity',           desc:'Upgrade to dual-sink vanity',               costs:{ flat:[2500,7000]  } },
      { id:'glass_shower',  label:'Frameless glass shower',  desc:'Custom frameless glass enclosure',          costs:{ basic:[2000,4000],   standard:[4000,8500],   premium:[8500,22000]  } },
    ],
  },
  basement: {
    rate: { basic:[50,80], standard:[80,130], premium:[130,215] },
    addOns: [
      { id:'bathroom', label:'Basement bathroom',     desc:'Full 3-piece bathroom rough-in and finish',      costs:{ basic:[11000,18000], standard:[18000,35000], premium:[35000,70000]  } },
      { id:'bar',      label:'Wet bar / kitchenette', desc:'Bar sink, cabinetry, mini-fridge rough-in',      costs:{ basic:[6000,12000],  standard:[12000,24000], premium:[24000,50000]  } },
      { id:'egress',   label:'Egress window',         desc:'Code-compliant egress window cut & install',     costs:{ flat:[3500,8500]  } },
      { id:'entrance', label:'Separate entrance',     desc:'New exterior door, stairwell, waterproofing',    costs:{ flat:[9000,22000] } },
      { id:'laundry',      label:'Laundry room',  desc:'Dedicated laundry space with plumbing rough-in',               costs:{ flat:[3000,8000]  } },
      { id:'underpinning', label:'Underpinning', desc:'Foundation underpinning to lower slab and increase ceiling height', costs:{ basic:[35000,55000], standard:[55000,95000], premium:[95000,160000] } },
    ],
  },
  fullHome: {
    rate: { basic:[120,165], standard:[165,225], premium:[280,420] },
    addOns: [
      { id:'structural', label:'Structural work',          desc:'Load-bearing wall removal, beam installation',  costs:{ flat:[18000,65000] } },
      { id:'hvac',       label:'Mechanical / HVAC',        desc:'New furnace, AC, ductwork, or hydronic system', costs:{ flat:[15000,42000] } },
      { id:'electrical', label:'Full electrical upgrade',  desc:'Panel upgrade, full rewire, new circuits',      costs:{ flat:[12000,32000] } },
      { id:'plumbing',   label:'Full plumbing upgrade',    desc:'New supply lines, drain stack, fixtures',       costs:{ flat:[15000,38000] } },
    ],
  },
  addition: {
    rate: { standard:[280,450], premium:[450,700] },
    addOns: [
      { id:'permits',    label:'Permits & consultant fees', desc:'Building permit, architect, engineer fees', costs:{ flat:[8000,22000]  } },
      { id:'foundation', label:'Foundation / underpinning', desc:'New foundation or basement extension',      costs:{ flat:[18000,55000] } },
      { id:'roofing',    label:'Roof tie-in',               desc:'Integrate new roof to existing structure',  costs:{ flat:[6000,18000]  } },
    ],
  },
  outdoor: {
    types: {
      deck:        { label:'Deck / patio',          ratePerSqft:{ basic:[55,110],   standard:[110,200],  premium:[200,400] } },
      landscaping: { label:'Landscaping',           flat:{ basic:[8000,22000],  standard:[22000,50000], premium:[50000,110000] } },
      garage:      { label:'Garage / laneway suite',flat:{ basic:[30000,55000], standard:[55000,90000], premium:[90000,160000] } },
    },
    addOns: [
      { id:'lighting',   label:'Outdoor lighting',          desc:'Landscape and structure lighting',      costs:{ flat:[3000,12000] } },
      { id:'pergola',    label:'Pergola / shade structure',  desc:'Wood or aluminum pergola',             costs:{ basic:[5000,10000],  standard:[10000,22000], premium:[22000,50000]  } },
      { id:'irrigation', label:'Irrigation system',         desc:'Automated lawn and garden irrigation', costs:{ flat:[4000,12000]  } },
    ],
  },
}

// ── State ─────────────────────────────────────────────────────────────────
let S = { step:0, projectType:null, details:{}, scope:[], finishLevel:'standard', contact:{}, submitted:false, submitting:false }

// ── Helpers ───────────────────────────────────────────────────────────────
function fmt(n) { return '$' + Math.round(n).toLocaleString('en-CA') }

function resolveRange(costs, level) {
  if (costs.flat) return costs.flat
  return costs[level] || costs.standard || [0,0]
}

function calculateEstimate() {
  const { projectType, details, scope, finishLevel } = S
  if (!projectType) return null
  const m = CM[projectType]
  if (!m) return null
  const lv = finishLevel || 'standard'
  let baseMin=0, baseMax=0, baseLabel='', addOnItems=[]

  switch (projectType) {
    case 'kitchen': {
      const sz = details.kitchenSize || 'medium'
      const b = m.sizes[sz]; if (!b) break
      baseLabel = b.label
      ;[baseMin,baseMax] = b[lv] || b.standard
      break
    }
    case 'bathroom': {
      const tp = details.bathroomType || 'four'
      const ct = Math.max(1, parseInt(details.bathroomCount)||1)
      const b = m.sizes[tp]; if (!b) break
      const tl = (m.types[tp]||{}).label||''
      baseLabel = ct>1 ? ct+'× '+tl : tl
      const [mn,mx] = b[lv] || b.standard
      baseMin = mn*ct; baseMax = mx*ct
      break
    }
    case 'basement': case 'fullHome': {
      const sqft = parseInt(details.squareFootage)||0; if (!sqft) break
      const [rn,rx] = m.rate[lv] || m.rate.standard
      baseMin=sqft*rn; baseMax=sqft*rx
      baseLabel = sqft.toLocaleString()+' sq ft @ '+fmt(rn)+'–'+fmt(rx)+'/sq ft'
      break
    }
    case 'addition': {
      const sqft = parseInt(details.squareFootage)||0; if (!sqft) break
      const rl = lv==='basic'?'standard':lv
      const [rn,rx] = m.rate[rl]
      baseMin=sqft*rn; baseMax=sqft*rx
      baseLabel = sqft.toLocaleString()+' sq ft @ '+fmt(rn)+'–'+fmt(rx)+'/sq ft'
      break
    }
    case 'outdoor': {
      const tp = details.outdoorType; if (!tp) break
      const tm = m.types[tp]; if (!tm) break
      if (tm.ratePerSqft) {
        const sqft = parseInt(details.squareFootage)||0; if (!sqft) break
        const [rn,rx] = tm.ratePerSqft[lv] || tm.ratePerSqft.standard
        baseMin=sqft*rn; baseMax=sqft*rx
        baseLabel = sqft.toLocaleString()+' sq ft @ '+fmt(rn)+'–'+fmt(rx)+'/sq ft'
      } else {
        const fl = tm.flat; [baseMin,baseMax] = fl[lv] || fl.standard
        baseLabel = tm.label
      }
      break
    }
  }

  if (m.addOns) {
    for (const id of scope) {
      const ao = m.addOns.find(a=>a.id===id); if (!ao) continue
      const [mn,mx] = resolveRange(ao.costs, lv)
      const ct = projectType==='bathroom' ? Math.max(1,parseInt(details.bathroomCount)||1) : 1
      addOnItems.push({ label:ao.label, min:mn*ct, max:mx*ct })
    }
  }
  const aoMin = addOnItems.reduce((s,i)=>s+i.min,0)
  const aoMax = addOnItems.reduce((s,i)=>s+i.max,0)
  return { baseMin, baseMax, baseLabel, addOnItems, totalMin:baseMin+aoMin, totalMax:baseMax+aoMax }
}

function canGoNext() {
  if (S.step===1) {
    switch (S.projectType) {
      case 'kitchen':  return !!S.details.kitchenSize
      case 'bathroom': return !!S.details.bathroomType
      case 'basement': case 'fullHome': case 'addition': return parseInt(S.details.squareFootage)>0
      case 'outdoor':  return !!S.details.outdoorType
    }
    return false
  }
  return true
}

function costHint(costs) {
  const lv = S.finishLevel||'standard'
  const [a,b] = resolveRange(costs,lv)
  return fmt(a)+' – '+fmt(b)
}

// ── Escape helper (prevent XSS in rendered values) ────────────────────────
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ── State Mutators ────────────────────────────────────────────────────────
function selectType(id) { S.projectType=id; S.details={}; S.scope=[]; S.step=1; render() }

// For radio/select changes: re-render the form step so selections and Next button update
function setDetailRadio(key, val) {
  S.details={...S.details,[key]:val}
  document.getElementById('wizard-form').innerHTML = renderStep1()
  refreshPanel()
}
// For text/number inputs: only refresh panel (avoids losing focus mid-type)
function setDetail(key, val) {
  S.details={...S.details,[key]:val}
  refreshPanel()
  if (S.step === 1) {
    const btn = document.querySelector('#wizard-form .btn.primary')
    if (btn) btn.disabled = !canGoNext()
  }
}

function toggleScope(id) {
  S.scope = S.scope.includes(id) ? S.scope.filter(s=>s!==id) : [...S.scope,id]
  // update checkbox visual and panel without full re-render
  const items = document.querySelectorAll('.scope-item')
  items.forEach(el=>{
    const cb = el.querySelector('input[type="checkbox"]')
    if (!cb) return
    // find which id this checkbox belongs to by its onchange
    el.classList.toggle('checked', cb.checked)
  })
  refreshPanel()
}

function setFinish(level) {
  S.finishLevel = level
  // update card selections
  document.querySelectorAll('.finish-card').forEach(el=>{
    el.classList.toggle('selected', el.getAttribute('onclick')==="setFinish('"+level+"')")
  })
  refreshPanel()
}

function setContact(key,val) { S.contact={...S.contact,[key]:val} }

function goNext()  { if(canGoNext()){ S.step++; render() } }
function goBack()  { S.step--; render() }

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  // Progress bar
  const pw = document.getElementById('progress-wrap')
  pw.innerHTML = S.step>0 && !S.submitted ? renderProgressBar() : ''

  // Layout columns
  const layout = document.getElementById('wizard-layout')
  layout.className = 'wizard-layout'

  // Form area
  const form = document.getElementById('wizard-form')
  if (S.submitted) {
    form.innerHTML = renderConfirmation()
  } else {
    switch(S.step) {
      case 0: form.innerHTML = renderStep0(); break
      case 1: form.innerHTML = renderStep1(); break
      case 2: form.innerHTML = renderStep2(); break
      case 3: form.innerHTML = renderStep3(); break
      case 4: form.innerHTML = renderStep4(); break
    }
  }

  // Panel
  refreshPanel()
}

function refreshPanel() {
  document.getElementById('wizard-panel').innerHTML = ''
}

// ── Submit ────────────────────────────────────────────────────────────────
async function handleSubmit() {
  // Validate
  const errs = {}
  if (!S.contact.name?.trim())  errs.name  = 'Name is required'
  if (!S.contact.email?.trim()) errs.email = 'Email is required'
  else if (!/\S+@\S+\.\S+/.test(S.contact.email)) errs.email = 'Enter a valid email'

  const nameErr  = document.getElementById('err-name')
  const emailErr = document.getElementById('err-email')
  if (nameErr)  nameErr.textContent  = errs.name  || ''
  if (emailErr) emailErr.textContent = errs.email || ''
  const nameIn  = document.getElementById('fname')
  const emailIn = document.getElementById('femail')
  if (nameIn)  nameIn.classList.toggle('error', !!errs.name)
  if (emailIn) emailIn.classList.toggle('error', !!errs.email)

  if (Object.keys(errs).length > 0) return

  S.submitting = true
  document.querySelector('.btn.primary.lg')?.setAttribute('disabled','')

  const est = calculateEstimate()
  const payload = {
    name:         S.contact.name,
    email:        S.contact.email,
    phone:        S.contact.phone || '—',
    address:      S.contact.address || '—',
    message:      S.contact.message || '—',
    projectType:  TYPE_LABELS[S.projectType]||S.projectType,
    finishLevel:  FINISH_LABELS[S.finishLevel]||S.finishLevel,
    estimateMin:  est ? fmt(est.totalMin) : '—',
    estimateMax:  est ? fmt(est.totalMax) : '—',
    scope:        S.scope.join(', ')||'—',
  }

  try {
    if (FORMSPREE_ID !== 'YOUR_FORMSPREE_ID') {
      const res = await fetch('https://formspree.io/f/'+FORMSPREE_ID, {
        method:'POST',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body: JSON.stringify(payload),
      })
      if (!res.ok) throw new Error('Submission failed')
    } else {
      // mailto fallback
      const subject = encodeURIComponent('Project Estimate Request — '+payload.projectType)
      const body = encodeURIComponent(
        'Name: '+payload.name+'\n'+
        'Email: '+payload.email+'\n'+
        'Phone: '+payload.phone+'\n'+
        'Address: '+payload.address+'\n'+
        'Project: '+payload.projectType+'\n'+
        'Finish: '+payload.finishLevel+'\n'+
        'Estimate: '+payload.estimateMin+' – '+payload.estimateMax+' CAD\n'+
        'Scope: '+payload.scope+'\n'+
        'Notes: '+payload.message
      )
      window.location.href = 'mailto:'+CONTACT_EMAIL+'?subject='+subject+'&body='+body
    }
    S.submitted = true
    render()
  } catch(e) {
    console.error(e)
    alert('There was an error sending your estimate. Please try again or contact us directly at '+CONTACT_EMAIL)
  } finally {
    S.submitting = false
  }
}
